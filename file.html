<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="index.css">
  <title>Document</title>
</head>

<body>
  <header>
    <span>Anura</span>
    <button class="anura-buttons">Log in</button>
  </header>
  <img src="home-workout-lady.jpeg" alt="home-workout-lady" class="fit">
  <img src="home-workout-lady-2.jpeg" alt="home-workout-lady-2" class="fit">
  <!-- <img src="man-practicing-yoga-mat-home_1303-26981.avif" alt="home-workoud-mister" class="fit"> -->
  <img src="home-workoud-mister.jpeg" alt="home-workoud-mister" class="fit">
  <!-- <img src="home-workout-mister-2.jpeg" alt="home-workout-mister-2" class="fit"> -->
  <h1 class="make-workout">
    <span class="input-workout">What Do You Feel Like Today?</span>
    <input type="text" class="text-input" placeholder="F.ex. upper body" />
    <button class="button">Find Your Workout!</button>
    <span class="recommended-workouts">Recommended Workouts</span>
  </h1>
  <h2 class="choose-workout">
    <span class="latest-workout">Latest Workout</span>
    <span class="suggested-workouts">Suggested Workouts</span>
  </h2>
  <script src="./index.js"></script>
</body>

</html>
